# ============================================================================
#  nginx site config for the HRMS FRONTEND EC2 (Ubuntu 22.04)
#  Install:
#    sudo cp deploy/frontend/nginx-hrms.conf /etc/nginx/sites-available/hrms
#    sudo ln -sf /etc/nginx/sites-available/hrms /etc/nginx/sites-enabled/hrms
#    sudo rm -f /etc/nginx/sites-enabled/default
#    sudo nginx -t && sudo systemctl reload nginx
#
#  >>> EDIT the one placeholder below: BACKEND_PRIVATE_IP <<<
#  Use the backend EC2's PRIVATE IPv4 (10.x.x.x) — traffic stays inside the VPC,
#  is free, and the backend port 5000 is never exposed to the internet.
# ============================================================================

# Upstream backend (Node/Express on :5000). keepalive reuses TCP connections.
upstream hrms_api {
    server BACKEND_PRIVATE_IP:5000;
    keepalive 32;
}

# Gzip compression — big win for the JS/CSS bundle and JSON API responses.
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml image/svg+xml font/woff2;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/hrms;
    index index.html;

    # Allow large uploads (avatars/documents are sent as base64 JSON).
    client_max_body_size 110m;

    # --- API reverse proxy: same-origin, so NO CORS in the browser ---------
    location /api/ {
        proxy_pass http://hrms_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Static assets: hashed filenames -> cache hard (1 year, immutable) --
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- SPA fallback: every other route serves index.html ----------------
    # index.html itself must NOT be cached, so new deploys are picked up.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Health check passthrough (optional convenience)
    location = /health {
        proxy_pass http://hrms_api/api/health;
    }
}
