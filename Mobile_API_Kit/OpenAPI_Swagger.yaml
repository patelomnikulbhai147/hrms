openapi: 3.0.3
info:
  title: HRMS Mobile Authentication API
  version: 1.0.0
  description: >-
    OTP-based authentication for the HRMS Flutter app. Login accepts Mobile, Employee ID, or Email. In
    OTP_MODE=development any N-digit code verifies (no SMS); in production a real SMS OTP is validated. The API contract
    is identical in both modes. The access token is a standard Bearer JWT accepted by every protected HRMS endpoint.
servers:
  - url: /api/v1/auth
    description: Mobile auth base path
tags:
  - name: Auth
    description: Mobile OTP authentication
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      description: Provide exactly one identifier.
      properties:
        mobile:
          type: string
          example: '9876543210'
        employeeId:
          type: string
          example: VE-AHM-001
        email:
          type: string
          example: abc@gmail.com
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OTP Generated
        otpRequired:
          type: boolean
          example: true
        otpLength:
          type: integer
          example: 4
        sessionId:
          type: string
          example: a1b2c3d4e5f6
        expiresInMinutes:
          type: integer
          example: 5
        otpMode:
          type: string
          example: development
        devOtp:
          type: string
          example: '1111'
          description: development mode only
    VerifyOtpRequest:
      type: object
      required:
        - sessionId
        - otp
      properties:
        sessionId:
          type: string
          example: a1b2c3d4e5f6
        otp:
          type: string
          example: '1234'
    VerifyOtpResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        accessToken:
          type: string
          example: eyJhbGciOi...
        refreshToken:
          type: string
          example: eyJhbGciOi...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600
        refreshExpiresIn:
          type: integer
          example: 2592000
        user:
          $ref: '#/components/schemas/UserProfile'
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOi...
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          example: 1
        employeeId:
          type: string
          example: VE-AHM-001
        employeeCode:
          type: string
          example: VE-AHM-001
        firstName:
          type: string
          example: Om
        lastName:
          type: string
          example: Patel
        email:
          type: string
          example: abc@gmail.com
        mobile:
          type: string
          example: '9876543210'
        company:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        branch:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        department:
          type: string
          example: IT
        designation:
          type: string
          example: Developer
        role:
          type: string
          example: Employee
        permissions:
          type: array
          items:
            type: string
          example:
            - attendance.view
            - attendance.mark
            - leave.create
        profileImage:
          type: string
          example: ''
        isFirstLogin:
          type: boolean
          example: false
        isPasswordCreated:
          type: boolean
          example: true
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: User not found
        code:
          type: string
          example: USER_NOT_FOUND
paths:
  /login:
    post:
      tags:
        - Auth
      summary: Start login — generate an OTP session
      description: Accepts Mobile, Employee ID, or Email. In development mode no SMS is sent and any N-digit OTP will verify.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              byMobile:
                value:
                  mobile: '9876543210'
              byEmployeeId:
                value:
                  employeeId: VE-AHM-001
              byEmail:
                value:
                  email: abc@gmail.com
      responses:
        '200':
          description: OTP session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '403':
          description: ACCOUNT_INACTIVE / BRANCH_DISABLED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /verify-otp:
    post:
      tags:
        - Auth
      summary: Verify OTP — issue access + refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOtpResponse'
        '400':
          description: INVALID_OTP / OTP_EXPIRED / INVALID_SESSION
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: TOO_MANY_ATTEMPTS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /refresh:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  accessToken:
                    type: string
                  tokenType:
                    type: string
                  expiresIn:
                    type: integer
        '401':
          description: REFRESH_TOKEN_INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /logout:
    post:
      tags:
        - Auth
      summary: Logout (client discards tokens)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
        '401':
          description: Not authorized
  /me:
    get:
      tags:
        - Auth
      summary: Current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authorized
