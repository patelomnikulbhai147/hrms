openapi: 3.0.3
info:
  title: HRMS Mobile App API
  version: 1.0.0
  description: >-
    Employee mobile app API. OTP login linked to Temporary Employee records; 7-step resume-safe registration;
    approval-gated dashboard. Every response uses { success, message, data, errors, timestamp }.
servers:
  - url: http://localhost:5000
    description: Development
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
tags:
  - name: Authentication
  - name: Registration
  - name: Dashboard
paths:
  /api/app/auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              mobile: '9876543210'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                success: true
                message: Success
                data:
                  sessionId: a1b2c3d4e5f6
                  otpRequired: true
                  otpLength: 4
                  expiresIn: 300
                  otpMode: development
                  devOtp: '1111'
                errors: []
                timestamp: '2026-06-25T12:00:00.000Z'
        '400':
          description: MOBILE_REQUIRED
          content:
            application/json:
              example:
                success: false
                message: Mobile number is required.
                data: null
                errors:
                  - code: MOBILE_REQUIRED
                    message: Mobile number is required.
                timestamp: '2026-06-25T12:00:00.000Z'
        '404':
          description: EMPLOYEE_NOT_FOUND
          content:
            application/json:
              example:
                success: false
                message: Employee not found.
                data: null
                errors:
                  - code: EMPLOYEE_NOT_FOUND
                    message: Employee not found.
                timestamp: '2026-06-25T12:00:00.000Z'
  /api/app/auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              sessionId: a1b2c3d4e5f6
              otp: '1234'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                success: true
                message: Success
                data:
                  accessToken: eyJhbGciOi...
                  refreshToken: eyJhbGciOi...
                  tokenType: Bearer
                  expiresIn: 43200
                  refreshExpiresIn: 2592000
                  registrationCompleted: false
                  currentStep: 1
                  approvalStatus: Draft
                errors: []
                timestamp: '2026-06-25T12:00:00.000Z'
        '400':
          description: INVALID_OTP
          content:
            application/json:
              example:
                success: false
                message: Enter any 4-digit code.
                data: null
                errors:
                  - code: INVALID_OTP
                    message: Enter any 4-digit code.
                timestamp: '2026-06-25T12:00:00.000Z'
        '429':
          description: TOO_MANY_ATTEMPTS
          content:
            application/json:
              example:
                success: false
                message: Too many attempts.
                data: null
                errors:
                  - code: TOO_MANY_ATTEMPTS
                    message: Too many attempts.
                timestamp: '2026-06-25T12:00:00.000Z'
  /api/app/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            example:
              refreshToken: eyJhbGciOi...
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                success: true
                message: Success
                data:
                  accessToken: eyJhbGciOi...
                  tokenType: Bearer
                  expiresIn: 43200
                errors: []
                timestamp: '2026-06-25T12:00:00.000Z'
        '400':
          description: REFRESH_TOKEN_REQUIRED
          content:
            application/json:
              example:
                success: false
                message: A refresh token is required.
                data: null
                errors:
                  - code: REFRESH_TOKEN_REQUIRED
                    message: A refresh token is required.
                timestamp: '2026-06-25T12:00:00.000Z'
        '401':
          description: REFRESH_TOKEN_INVALID
          content:
            application/json:
              example:
                success: false
                message: Session expired. Please log in again.
                data: null
                errors:
                  - code: REFRESH_TOKEN_INVALID
                    message: Session expired. Please log in again.
                timestamp: '2026-06-25T12:00:00.000Z'
  /api/app/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                success: true
                message: Success
                data: {}
                errors: []
                timestamp: '2026-06-25T12:00:00.000Z'
        '401':
          description: NO_TOKEN
          content:
            application/json:
              example:
                success: false
                message: Not authorized — no token provided.
                data: null
                errors:
                  - code: NO_TOKEN
                    message: Not authorized — no token provided.
                timestamp: '2026-06-25T12:00:00.000Z'
